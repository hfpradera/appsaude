services:
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://humberto:performance@db:5432/humberto_performance
      UPLOAD_DIR: /app/data/uploads
      EXPORT_DIR: /app/data/exports
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: humberto_performance
      POSTGRES_USER: humberto
      POSTGRES_PASSWORD: performance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humberto -d humberto_performance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_data:
  postgres_data:
