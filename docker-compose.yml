services:
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/data/humberto_performance.db
      UPLOAD_DIR: /app/data/uploads
      EXPORT_DIR: /app/data/exports
    ports:
      - "3030:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
